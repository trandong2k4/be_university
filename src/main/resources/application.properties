# SERVER
server.port=${PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=always

# CAU hinh loading (nếu cần)
# JPA / Hibernate
spring.main.lazy-initialization=false
spring.jpa.show-sql=${SQL_SHOW:false}
spring.jpa.properties.hibernate.format_sql=${SQL_FORMAT:false}
spring.jpa.hibernate.ddl-auto=${FUNCTION:none}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=1

# Exception
# Bắt DispatcherServlet ném NoHandlerFoundException cho URL không khớp handler
spring.mvc.throw-exception-if-no-handler-found=true
# Tắt mapping static resource mặc định (nếu app thuần REST API, không cần serve static files)
spring.web.resources.add-mappings=false

# DATABASE: PostgreSQL Supabase/NeonDB
# ?sslmode=require
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



# LOGGING — Tối ưu, sạch, không spam
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=error
logging.level.org.springframework.web=warn
logging.level.org.springframework.security=warn
logging.level.org.springframework.transaction=warn
logging.level.org.springframework.orm.jpa=warn
# Giữ lại log debug cho code của bạn
logging.level.com.university=debug
logging.level.ums=debug


# Tùy chọn: ghi log ra file (để xem rõ hơn)
logging.exception-conversion-word=%replace(%wEx){'\n','␤'}%nopex
logging.file.name=logs/ums.log
logging.pattern.console=${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}

# Chatbot
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL}


# SendGrid (nếu bạn dùng SendGrid thay vì SMTP)
sendgrid.api.key=${SENDGRID_API_KEY}


# Mail Server (SMTP) — Sử dụng để gửi email xác nhận, thông báo, v.v.
spring.mail.host=smtp.gmail.com
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

# QUAN TRỌNG (thiếu là lỗi ngay)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Timeout (optional nhưng nên có)
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# Thiết lập thời gian timeout cho session (mặc định là 10 phút)
server.servlet.session.timeout=10m


# Ép Jackson (JSON) trả về giờ VN khi làm việc với React
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# Ép Hibernate/PostgreSQL dùng giờ VN
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh